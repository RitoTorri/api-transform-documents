<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Architect · Professional API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

      body {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background-color: #f8fafc;
        background-image: radial-gradient(#e2e8f0 0.8px, transparent 0.8px);
        background-size: 24px 24px; /* Sutil patrón de puntos para un look de ingeniería */
      }

      .code-font {
        font-family: "JetBrains Mono", monospace;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }

      /* Spinner minimalista */
      .loader {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Mejora de focus sin sobrecarga */
      .input-elegant {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .input-elegant:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        outline: none;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-xl">
      <article
        class="glass-card rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.04)] overflow-hidden"
      >
        <!-- Header Refinado -->
        <header class="p-8 pb-0 flex justify-between items-center">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div
                class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center"
              >
                <svg
                  class="w-5 h-5 text-white"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2.5"
                    d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
                  />
                </svg>
              </div>
              <h1 class="text-xl font-bold text-slate-900 tracking-tight">
                PDF Architect
              </h1>
            </div>
            <p class="text-slate-500 text-sm font-medium">
              Motor de renderizado estático
            </p>
          </div>
          <div class="text-right">
            <span
              class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-widest border border-slate-200"
            >
              v2.0 Stable
            </span>
          </div>
        </header>

        <!-- Formulario -->
        <form id="pdfForm" class="p-8 space-y-6" novalidate>
          <!-- Área de Código -->
          <div class="space-y-2">
            <div class="flex justify-between items-end">
              <label
                for="htmlInput"
                class="text-xs font-bold text-slate-700 uppercase tracking-wider"
                >Estructura HTML</label
              >
              <span class="text-[10px] text-slate-400 code-font"
                >Format: HTML5 / CSS3</span
              >
            </div>
            <textarea
              id="htmlInput"
              rows="8"
              class="w-full p-4 code-font text-sm bg-slate-900 text-indigo-300 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500/50 resize-none shadow-inner"
              placeholder="<!-- Escribe tu HTML aquí -->"
            >
<h1>Reporte de Sistema</h1><p>Documento generado vía API segura.</p></textarea
            >
          </div>

          <!-- Configuración en fila -->
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label
                for="titleInput"
                class="text-xs font-bold text-slate-700 uppercase tracking-wider"
                >Nombre Archivo</label
              >
              <input
                type="text"
                id="titleInput"
                class="input-elegant w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 font-medium"
                placeholder="Ej: invoice-001"
                value="documento-exportado"
              />
            </div>
            <div class="space-y-2">
              <label
                for="formatInput"
                class="text-xs font-bold text-slate-700 uppercase tracking-wider"
                >Dimensiones</label
              >
              <select
                id="formatInput"
                class="input-elegant w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 font-medium appearance-none cursor-pointer"
              >
                <option value="A4">A4 Standard</option>
                <option value="Letter">Letter (US)</option>
                <option value="Legal">Legal</option>
              </select>
            </div>
          </div>

          <!-- Acción Principal -->
          <button
            type="submit"
            id="submitBtn"
            class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 active:transform active:scale-[0.98] text-white font-bold rounded-2xl shadow-xl shadow-indigo-200 transition-all duration-200 flex items-center justify-center gap-3 group"
          >
            <span id="btnText">Compilar y Descargar</span>
            <div id="btnLoader" class="hidden loader"></div>
            <svg
              id="btnIcon"
              class="w-5 h-5 group-hover:translate-x-1 transition-transform"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 8l4 4m0 0l-4 4m4-4H3"
              />
            </svg>
          </button>
        </form>

        <!-- Feedback de Estado -->
        <div id="statusMessage" class="hidden px-8 pb-8"></div>
      </article>

      <footer class="mt-8 flex justify-between items-center px-4">
        <p
          class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"
        >
          Powered by NestJS & Puppeteer
        </p>
        <div class="flex gap-4">
          <div
            class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"
          ></div>
        </div>
      </footer>
    </main>

    <script>
      // Lógica optimizada (Idéntica a tu funcional original pero con los nuevos IDs visuales)
      (function () {
        const form = document.getElementById("pdfForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const btnLoader = document.getElementById("btnLoader");
        const btnIcon = document.getElementById("btnIcon");
        const statusMessage = document.getElementById("statusMessage");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const html = document.getElementById("htmlInput").value.trim();
          const title = document.getElementById("titleInput").value.trim();
          const format = document.getElementById("formatInput").value;

          if (!html) {
            showMessage("El contenido HTML es obligatorio", "error");
            return;
          }

          setLoading(true);
          statusMessage.classList.add("hidden");

          try {
            const response = await fetch(
              "http://localhost:3000/transform/pdf",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ html, title, format }),
              },
            );

            if (!response.ok)
              throw new Error("Error en la respuesta del servidor");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${title || "archivo"}.pdf`;
            link.click();
            showMessage("Documento procesado con éxito", "success");
          } catch (error) {
            showMessage(error.message, "error");
          } finally {
            setLoading(false);
          }
        });

        function setLoading(isLoading) {
          submitBtn.disabled = isLoading;
          btnText.innerText = isLoading
            ? "Procesando..."
            : "Compilar y Descargar";
          btnLoader.classList.toggle("hidden", !isLoading);
          btnIcon.classList.toggle("hidden", isLoading);
          submitBtn.classList.toggle("opacity-80", isLoading);
        }

        function showMessage(text, type) {
          const isSuccess = type === "success";
          statusMessage.innerHTML = `
                    <div class="flex items-center gap-3 p-4 rounded-xl text-xs font-bold uppercase tracking-tight ${isSuccess ? "bg-emerald-50 text-emerald-700 border border-emerald-100" : "bg-rose-50 text-rose-700 border border-rose-100"}">
                        <span>${text}</span>
                    </div>
                `;
          statusMessage.classList.remove("hidden");
        }
      })();
    </script>
  </body>
</html>
